data:
  system: lorenz63
  dt: 0.01
  T_max: 5.0
  obs_interval: 20
  R_var: 0.5
  B_var: 2.0
  Q_var: 0.05
  param_bias: 0.05
  num_windows: 2000
  window_spacing: 2000
  spinup_steps: 10000

model:
  K_inner: 5
  N_outer: 10
  nu: 1.0
  parameterization: T+O+S+E
  hidden_channels: [64, 128, 256]
  time_emb_dim: 64
  dropout: 0.1

training:
  lr: 1e-3
  epochs_stage1: 200
  epochs_stage2: 400
  batch_size: 32

baselines:
  da_window_steps: 500
  N_ensemble: 30
  weak_opt_steps: 150
  strong_max_iter: 40

case_study:
  param_bias: 0.15
  forcing_state_bias: 0.15
  forcing_coupling: quartic
