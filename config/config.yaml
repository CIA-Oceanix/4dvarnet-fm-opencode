data:
  system: lorenz63

training:
  stage1:
    epochs: 200
    lr: 0.001
    gradient_clip_val: 10.0
  stage2:
    epochs: 400
    lr: 0.001
    gradient_clip_val: 1.0
  batch_size: 32
  loss:
    use_gradient: true
    gradient_weight: 0.1

paths:
  checkpoint_dir: checkpoints
  checkpoint_stage1: checkpoints/stage1.pt
  checkpoint_stage2: checkpoints/stage2.pt
  outputs_dir: outputs

baselines:
  da_window_steps: 300
  N_ensemble: 30
  batch_size: 128
  weak4dvar:
    opt_steps: 150
    lr: 0.02
  strong4dvar:
    max_iter: 40
    lr: 0.1
  enkf:
    inflation: 1.0
    loc_radius: -1.0
  etkf:
    inflation: 1.0
    loc_radius: -1.0
    loc_mode: square_root