# @package _global_
defaults:
  - /lorenz63_default
  - _self_

model:
  model_type: joint_direct_unet
  direct_unet:
    hidden_channels: [32, 64, 128]
    dropout: 0.1
  joint_direct_unet:
    param_dim: 4
    param_loss_weight: 0.1
    param_noise_min: 0.0
    param_noise_max: 0.3
training:
  stage1:
    epochs: 200
    lr: 0.001
    gradient_clip_val: 10.0
  stage2:
    epochs: 0
data:
  data_setup: s0_s1
  bias_max: 0.2
  num_train_windows: 2000
  num_val_windows: 100
  num_test_windows: 200
  test_param_noise: 0.2
baselines:
  da_window_steps: 50
  enkf:
    inflation: 2.0
  etkf:
    inflation: 2.0
